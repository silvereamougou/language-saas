<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DIGIELERNING | Master Every Skill Digitally</title>
  <meta name="description"
    content="The world's most advanced digital learning platform for individuals and enterprises. Learn faster, retain more, and succeed with DIGIELERNING." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
</head>

<body>
  <div id="root"></div>
  <!-- Netlify form definitions for discovery during build -->
  <form name="contact" netlify netlify-honeypot="bot-field" hidden>
    <input type="text" name="first_name" />
    <input type="text" name="last_name" />
    <input type="email" name="email" />
    <input type="text" name="subject" />
    <textarea name="message"></textarea>
  </form>
  <form name="affiliation" netlify netlify-honeypot="bot-field" hidden>
    <input type="text" name="name" />
    <input type="email" name="email" />
    <input type="text" name="company" />
    <input type="text" name="website" />
    <input type="text" name="product_type" />
    <textarea name="description"></textarea>
  </form>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
