[build]
  command = "npm run build"
  publish = "dist"

# Configure Netlify's secret scanner to omit non-sensitive variables 
# that are flagged when their values appear in the build output.
[build.processing.secrets_scan]
  enabled = true
  omit_keys = ["NODE_ENV", "PORT", "VITE_API_URL"]

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
